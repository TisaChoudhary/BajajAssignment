<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BFHL Graph API Explorer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-container">
    <header class="header">
      <div class="logo">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path></svg>
      </div>
      <h1>Hierarchy API</h1>
    </header>

    <main class="card neumorphic">
      <section class="input-section">
        <label for="jsonInput" class="label">Graph Edges (JSON)</label>
        <div class="input-wrapper">
          <textarea
            id="jsonInput"
            rows="5"
            placeholder='{ "data": ["A->B", "A->C", "B->D"] }'
            spellcheck="false"
          ></textarea>
        </div>

        <div class="examples-row">
          <button class="example-chip neumorphic-btn" data-example='{"data":["A->B","A->C","B->D","C->E","E->F"]}'>Simple Tree</button>
          <button class="example-chip neumorphic-btn" data-example='{"data":["X->Y","Y->Z","Z->X"]}'>Cycle</button>
          <button class="example-chip neumorphic-btn" data-example='{"data":["A->B","A->C","B->D","C->E","E->F","X->Y","Y->Z","Z->X","P->Q","Q->R","G->H","G->H","G->I","hello","1->2","A->"]}'>Mixed Data</button>
        </div>

        <button class="submit-btn neumorphic-btn primary" id="submitBtn">
          Generate Graph
        </button>
      </section>

      <div class="error-bar hidden neumorphic-inset" id="errorBar">
        <span id="errorText"></span>
      </div>

      <section class="results-section hidden" id="resultsSection">
        <h2 class="results-title">Response Overview</h2>

        <div class="user-info-bar neumorphic-inset" id="userInfoBar"></div>

        <div class="stats-grid" id="statsGrid">
          <div class="stat-card neumorphic">
            <span class="stat-value" id="valTotalTrees">0</span>
            <span class="stat-label">Total Trees</span>
          </div>
          <div class="stat-card neumorphic">
            <span class="stat-value" id="valTotalCycles">0</span>
            <span class="stat-label">Total Cycles</span>
          </div>
          <div class="stat-card neumorphic">
            <span class="stat-value" id="valLargestRoot">-</span>
            <span class="stat-label">Largest Root</span>
          </div>
        </div>

        <div class="alerts-container" id="alertsContainer"></div>

        <h3 class="section-subtitle">Hierarchies</h3>
        <div class="hierarchies-container neumorphic-inset" id="hierarchiesContainer"></div>

        <details class="raw-json-wrapper neumorphic">
          <summary>View Raw JSON</summary>
          <pre class="raw-json" id="rawJson"></pre>
        </details>
      </section>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
